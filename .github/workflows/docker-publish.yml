name: Docker Publish

# Retired as the delivery path: embedthat now deploys via the homeserver
# local poll-and-build pipeline (vps/homeserver/deploy-embedthat.ps1 builds
# embedthat:local from a git submodule). This workflow no longer runs on push;
# it stays available for manual one-off publishes only (workflow_dispatch).
on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from pyproject.toml
        id: version
        run: |
          VERSION=$(grep -m1 '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            metheoryt/embedthat:latest
            metheoryt/embedthat:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
