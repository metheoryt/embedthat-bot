# Production stack for the homeserver poll-and-build deploy pipeline.
# Built LOCALLY from this checkout (a git submodule under vps/homeserver/embedthat)
# by deploy-embedthat.ps1 -- never pulled from a registry. The image tag is
# local-only (embedthat:local) on purpose: a registry tag (metheoryt/embedthat:latest)
# would let tugtainer pull-update the container out from under the local build.
#
# `name: embedthat` pins the compose project so this reconciles the existing
# running stack and REUSES the embedthat_redis_data volume. Do not rename it,
# and never `down -v` (it would orphan the dramatiq queue / redis state).
name: embedthat

services:
  bot:
    image: embedthat:local
    build: .
    env_file: [ .env ]
    depends_on: [ redis ]
    restart: unless-stopped
  worker:
    image: embedthat:local          # same locally-built image; compose builds it once
    build: .
    env_file: [ .env ]
    command: dramatiq bot.worker.actors --processes 1 --threads 4
    depends_on: [ redis ]
    restart: unless-stopped
  redis:
    image: redis/redis-stack:latest
    volumes:
      - redis_data:/data
    environment:
      REDIS_ARGS: "--save 60 1"
    restart: unless-stopped

volumes:
  redis_data:
